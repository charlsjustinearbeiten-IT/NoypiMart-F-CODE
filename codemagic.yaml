workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Disable SPM
        script: |
          flutter config --no-enable-swift-package-manager
      - name: Flutter pub get
        script: |
          flutter pub get
      - name: Build iOS Simulator
        script: |
          flutter build ios --debug --no-codesign --simulator
    artifacts:
      - build/ios/iphonesimulator/Runner.app